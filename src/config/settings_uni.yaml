# =============================================================================
# Konfiguration: Uni (2x NVIDIA A100 80 GB)
# =============================================================================
# Profil für die Uni-Hardware. Alle Modelle nutzen AWQ-4bit Quantisierung
# für optimale Performance auf der Ampere-Architektur (Marlin-Kernel).
# GPU-Pinning: Tier 1+3 auf GPU 0, Tier 2+4 auf GPU 1 (Tier-Diversität
# für parallele Inferenz). Auto-TP nur für Baseline (122B braucht TP=2).

# Hardware-Ressourcen
hardware:
  per_gpu_vram_gb: 80 # 2x A100 80GB
  ram_for_offloading_gb: 128 # Für vLLM Sleep Mode (Offloading in CPU-RAM)
  num_gpus: 2

# GPU-Einstellungen (Energiemessung)
gpu:
  sampling_interval: 0.1

# Router-Modell (LLM-as-a-Router, immer geladen, Non-Reasoning)
router:
  model: "cyankiwi/Qwen3.5-2B-AWQ-4bit"
  vram_gb: 2.5
  max_output_tokens: 10
  max_model_len: 16384
  enforce_eager: true
  min_process_budget_gb: 3.2

# Zielmodell-Katalog (universell, gleiche Liste wie lokal + größere Modelle)
models:
  - id: "qwen3.5-4b"
    name: "cyankiwi/Qwen3.5-4B-AWQ-4bit"
    vram_gb: 4.06
    tier: 1
    gpu: 0 # Statisches GPU-Pinning: Tier 1 + 3 auf GPU 0
    description: "4B dense model: Direct-response tier for simple factual recall, definitions, everyday trivia, short paraphrases, simple formatting tasks, straightforward extraction, obvious multiple-choice questions, and routine writing or summarization without deep reasoning"
    sampling:
      temperature: 0.0
      top_p: 0.95
      top_k: 20
      min_p: 0.0
      presence_penalty: 1.5
      repetition_penalty: 1.0
    # Benchmark-Sampling (Non-Thinking-Modus): top_p=1.0, presence_penalty=2.0 per Qwen-Empfehlung
    sampling_nothinking:
      temperature: 0.0
      top_p: 1.0
      top_k: 20
      min_p: 0.0
      presence_penalty: 2.0
      repetition_penalty: 1.0

  - id: "qwen3.5-9b"
    name: "cyankiwi/Qwen3.5-9B-AWQ-4bit"
    vram_gb: 9.09
    tier: 2
    gpu: 1 # Statisches GPU-Pinning: Tier 2 + 4 auf GPU 1
    description: "9B dense model: Moderate-capability tier for non-obvious but bounded tasks: reading comprehension, school-level science or humanities questions, short structured explanations, straightforward math word problems, routine code explanation, harder formatting tasks, and multiple-choice questions that require some reasoning"
    sampling:
      temperature: 0.0
      top_p: 0.95
      top_k: 20
      min_p: 0.0
      presence_penalty: 1.5
      repetition_penalty: 1.0
    sampling_nothinking:
      temperature: 0.0
      top_p: 1.0
      top_k: 20
      min_p: 0.0
      presence_penalty: 2.0
      repetition_penalty: 1.0

  - id: "qwen3.5-35b-moe"
    name: "cyankiwi/Qwen3.5-35B-A3B-AWQ-4bit"
    vram_gb: 24.8
    tier: 3
    gpu: 0 # Statisches GPU-Pinning: Tier 1 + 3 auf GPU 0
    description: "35B A3B MoE model: Advanced reasoning tier for harder benchmark-style problems with specialized knowledge: multi-step math, analytical comparisons, synthesis across several facts, code debugging or refactoring, and domain questions where Tier 2 feels risky but Tier 4 is not yet necessary. Use when you want to save energy compared to Tier 4 but still need next to strong reasoning and expert knowledge. Otherwise prefer Tier 4 for maximum correctness. Can work well for coding tasks with limited context length (e.g. <8K tokens). For this tier, strongly prefer T over N. The MoE architecture benetits significantly from CoT reasoning. Only use N for genuinely trivial sub-tasks or formatting related stuff."
    sampling:
      temperature: 0.0
      top_p: 0.95
      top_k: 20
      min_p: 0.0
      presence_penalty: 1.5
      repetition_penalty: 1.0
    sampling_nothinking:
      temperature: 0.0
      top_p: 1.0
      top_k: 20
      min_p: 0.0
      presence_penalty: 2.0
      repetition_penalty: 1.0

  - id: "qwen3.5-27b"
    name: "cyankiwi/Qwen3.5-27B-AWQ-4bit"
    vram_gb: 20.1
    tier: 4
    gpu: 1 # Statisches GPU-Pinning: Tier 2 + 4 auf GPU 1
    description: "27B dense model: Highest-capability dense tier for proof-style mathematics, formal logic, complex algorithm design, from-scratch code generation, difficult debugging with many interacting constraints, long-horizon synthesis, hard to very hard multiple choice questions, multi-step organic chemistry syntheses with 3+ reaction steps or retrosynthesis, numerical physics calculations requiring precise formula application, and any task where failure of a smaller tier would be costly or certain. If in doubt about complexity or risk, prefer this tier."
    sampling:
      temperature: 0.0
      top_p: 0.95
      top_k: 20
      min_p: 0.0
      presence_penalty: 1.5
      repetition_penalty: 1.0
    sampling_nothinking:
      temperature: 0.0
      top_p: 1.0
      top_k: 20
      min_p: 0.0
      presence_penalty: 2.0
      repetition_penalty: 1.0

# Baseline (Always-Large mit Reasoning, separat vom Router-Setup)
# Qwen3.5-122B-A10B: 122B Parameter MoE mit 10B aktiviert, AWQ-4bit
# Stärkstes einzelnes Modell (AI-Index 42 R), verbraucht ~80GB VRAM (TP=2)
# Router-Setup gesamt ~70GB vs. Baseline ~80GB → vergleichbares VRAM-Budget
baseline:
  model_id: "qwen3.5-122b-moe"
  model_name: "cyankiwi/Qwen3.5-122B-A10B-AWQ-4bit"
  vram_gb: 80.1
  enable_thinking: true
  sampling:
    temperature: 0.0
    top_p: 0.95
    top_k: 20
    min_p: 0.0
    presence_penalty: 1.5
    repetition_penalty: 1.0

# Scheduler-Einstellungen
scheduler:
  preload_strategy: "fill_small_first"
  eviction_policy: "lru"
  kv_cache_reserve_gb: 8.5
  cuda_context_overhead_gb: 1

# Inferenz-Einstellungen (vLLM-Engine-Parameter, Sampling kommt pro Modell)
inference:
  vllm:
    dtype: "auto"
    max_model_len: 32768
    gpu_memory_utilization: 0.96
    enforce_eager: false

# vLLM-Server-Einstellungen
server:
  base_port: 8001
  host: "127.0.0.1"

# Experiment-Einstellungen
experiment:
  batch_size: 32
  output_dir: "results"

# Docker-Einstellungen (für Uni-Server mit Docker-Container)
# HF-Cache-Pfad wird automatisch gesetzt wenn Docker erkannt wird.
docker:
  hf_cache_path: "/workspace/hf-models"
